name: Build Hayai APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install build tools
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0" 2>/dev/null || true

      - name: Copy CI gradle.properties
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.daemon=false
          org.gradle.jvmargs=-Xmx4g -XX:+UseG1GC -Dfile.encoding=UTF-8
          org.gradle.workers.max=2
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configuration-cache=true
          org.gradle.configuration-cache.problems=warn
          kotlin.daemon.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          kotlin.incremental=false
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleStandardDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hayai-debug-apk
          path: app/build/outputs/apk/standard/debug/*.apk